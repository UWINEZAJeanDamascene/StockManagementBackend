# =============================================================================
# Deploy Workflow
# =============================================================================
# Runs on merge to main branch only
# Deploys to production
# =============================================================================

name: Deploy Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================================================
  # Build and Push Docker Image
  # =============================================================================
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # =============================================================================
  # Deploy to Staging
  # =============================================================================
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    environment: staging
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          # Add your staging deployment commands here
          # This could be:
          # - SSH to staging server and pull new image
          # - kubectl apply for Kubernetes
          # - docker-compose -f docker-compose.staging.yml up -d
          
          echo "Staging deployment would use image: ${{ needs.build-and-push.outputs.image-tag }}"

  # =============================================================================
  # Deploy to Production
  # =============================================================================
  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          # Add your production deployment commands here
          # This could be:
          # - SSH to production server and pull new image
          # - kubectl apply for Kubernetes
          # - docker-compose -f docker-compose.yml up -d
          
          echo "Production deployment would use image: ${{ needs.build-and-push.outputs.image-tag }}"
          
      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment completed with status: ${{ job.status }}"

  # =============================================================================
  # Rollback (on failure)
  # =============================================================================
  rollback:
    needs: [deploy-staging, deploy-production]
    if: failure()
    runs-on: ubuntu-latest
    
    steps:
      - name: Rollback on failure
        run: |
          echo "Deployment failed! Initiating rollback..."
          # Add rollback commands here
          # This should revert to the previous stable version