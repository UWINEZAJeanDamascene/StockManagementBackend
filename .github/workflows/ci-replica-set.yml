name: CI - Replica Set Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  replica-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure docker compose available
        run: docker compose version || docker-compose version

      - name: Start replica set stack
        run: docker compose -f docker/replica/docker-compose.yml up -d --remove-orphans

      - name: Wait for mongod to be ready
        run: |
          for i in $(seq 1 60); do
            docker exec mongo1 mongo --eval 'db.adminCommand("ping")' >/dev/null 2>&1 && break || sleep 2
            echo "waiting for mongo..."
          done

      - name: Initiate replica set
        run: |
          docker exec mongo1 mongo --eval 'rs.initiate({_id:"rs0",members:[{_id:0,host:"mongo1:27017"},{_id:1,host:"mongo2:27017"},{_id:2,host:"mongo3:27017"}]});' || true

      - name: Wait for primary
        run: |
          for i in $(seq 1 60); do
            PRIMARY=$(docker exec mongo1 mongo --quiet --eval 'rs.isMaster().ismaster' 2>/dev/null || echo "false")
            if [ "$PRIMARY" = "true" ]; then
              echo "Primary elected"
              break
            fi
            sleep 2
            echo "waiting for primary..."
          done

      - name: Run tests inside app container
        run: |
          docker compose -f docker/replica/docker-compose.yml exec -T app sh -c "npm ci --silent && npm test --silent"
